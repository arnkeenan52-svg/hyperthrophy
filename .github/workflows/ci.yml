name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint · Build · Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify engine & data model
        run: npm run verify

      - name: Verify DB seeding (real dataset)
        run: npm run verify:db

      - name: Verify Apple Health parser
        run: npm run verify:health

  e2e:
    name: E2E (browser)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start server
        run: |
          npx next start -p 3500 &
          for i in $(seq 1 30); do curl -sf http://localhost:3500/ >/dev/null && break; sleep 1; done

      - name: Run end-to-end tests
        env:
          BASE: http://localhost:3500
        run: npm run e2e
